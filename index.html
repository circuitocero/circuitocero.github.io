<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circuito Cero | Oficial</title>
    <script src="https://unpkg.com/scrollreveal"></script>
    <style>
        :root { --rojo: #ff0000; --negro: #000000; --blanco: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: var(--blanco); color: var(--negro); }
        
        nav { padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; background: white; z-index: 100; }
        .logo { font-weight: bold; font-size: 1.5rem; }
        .logo span { color: var(--rojo); }

        .hero { text-align: center; padding: 60px 20px; }
        h1 { font-size: 3rem; margin-bottom: 10px; }
        .btn { background: var(--rojo); color: white; padding: 12px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; display: inline-block; border: none; cursor: pointer; }

        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #f9f9f9; padding: 30px; border-radius: 20px; text-align: center; }

        /* Estilos del Chat */
        #chat-window { position: fixed; bottom: 90px; right: 20px; width: 320px; height: 400px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: none; flex-direction: column; z-index: 1000; border: 1px solid #eee; }
        #messages { flex: 1; padding: 15px; overflow-y: auto; font-size: 14px; }
        .chat-header { background: var(--rojo); color: white; padding: 10px; border-radius: 15px 15px 0 0; font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">CIRCUITO <span>CERO</span></div>
        <a href="https://www.youtube.com/@circuitocero" class="btn">YouTube</a>
    </nav>

    <header class="hero">
        <p>MÉXICO 2026</p>
        <h1>Educación y Tecnología</h1>
        <p>Plataforma para ingenieros y entusiastas de la mecatrónica.</p>
        <br>
        <iframe width="100%" height="400" src="https://www.youtube.com/embed?listType=user_uploads&list=circuitocero" style="max-width:800px; border-radius:15px;" frameborder="0"></iframe>
    </header>

    <main class="container">
        <div class="grid">
            <div class="card"><h2>Tienda</h2><p>Componentes y Ropa</p></div>
            <div class="card"><h2>Asesoría</h2><p>Ayuda Estudiantil</p></div>
        </div>
    </main>

    <div id="chat-window">
        <div class="chat-header">Asistente Cero-Bot</div>
        <div id="messages">Haz clic en el robot para cargar la IA...</div>
        <div style="padding:10px; border-top:1px solid #eee; display:flex;">
            <input type="text" id="user-input" style="flex:1; padding:5px;" placeholder="Pregunta algo...">
            <button id="send-btn" style="background:var(--rojo); color:white; border:none; padding:5px 10px; border-radius:5px; margin-left:5px;">↑</button>
        </div>
    </div>
    <button id="chat-toggle" style="position:fixed; bottom:20px; right:20px; width:60px; height:60px; border-radius:50%; background:var(--rojo); color:white; border:none; font-size:1.5rem; cursor:pointer; box-shadow:0 5px 15px rgba(255,0,0,0.4);">🤖</button>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";
        let engine;
        const messages = document.getElementById('messages');
        const chatWindow = document.getElementById('chat-window');

        document.getElementById('chat-toggle').onclick = async () => {
            chatWindow.style.display = chatWindow.style.display === 'none' ? 'flex' : 'none';
            if (!engine) {
                messages.innerHTML = "<i>Cargando IA de Circuito Cero... espera un momento (no consume tokens).</i>";
                engine = await webllm.CreateWebWorkerEngine(new Worker(new URL("https://esm.run/@mlc-ai/web-llm", import.meta.url)), "gemma-2b-it-q4f16_1-MLC");
                messages.innerHTML = "<b>Cero-Bot:</b> ¡Hola! Soy tu asistente de ingeniería. ¿Qué duda técnica tienes?";
            }
        };

        document.getElementById('send-btn').onclick = async () => {
            const input = document.getElementById('user-input');
            const text = input.value;
            if(!text) return;
            messages.innerHTML += `<div><b>Tú:</b> ${text}</div>`;
            input.value = "";
            const reply = await engine.chat.completions.create({
                messages: [{role: "system", content: "Eres Cero-Bot, IA de @circuitocero. Experto en mecatrónica y electrónica."}, {role: "user", content: text}]
            });
            messages.innerHTML += `<div style="color:red"><b>Cero-Bot:</b> ${reply.choices[0].message.content}</div>`;
        };
    </script>
</body>
</html>
