<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circuito Cero | Hub de Ingeniería</title>
    <style>
        :root { --rojo: #ff0000; --negro: #000000; --blanco: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: var(--blanco); }
        nav { padding: 1rem 5%; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; }
        .logo { font-weight: bold; font-size: 1.5rem; }
        .logo span { color: var(--rojo); }
        .hero { text-align: center; padding: 40px 20px; }
        
        /* Chat */
        #chat-window { position: fixed; bottom: 90px; right: 20px; width: 320px; height: 450px; background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); display: none; flex-direction: column; z-index: 2000; border: 1px solid #eee; overflow: hidden; }
        .chat-header { background: var(--rojo); color: white; padding: 15px; font-weight: bold; }
        #messages { flex: 1; padding: 15px; overflow-y: auto; font-size: 14px; }
        .chat-input { padding: 10px; border-top: 1px solid #eee; display: flex; }
        .chat-input input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 10px; }
        #chat-toggle { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: var(--rojo); color: white; border: none; cursor: pointer; font-size: 1.5rem; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">CIRCUITO <span>CERO</span></div>
    </nav>

    <header class="hero">
        <h1>Centro de Ingeniería</h1>
        <p>Plataforma oficial con IA interactiva.</p>
    </header>

    <div id="chat-window">
        <div class="chat-header">🤖 Cero-Bot (IA Real)</div>
        <div id="messages">
            <p><b>Cero-Bot:</b> ¡Hola! Soy el asistente de Circuito Cero. Pregúntame sobre electrónica o mecatrónica.</p>
        </div>
        <div class="chat-input">
            <input type="text" id="user-input" placeholder="Escribe tu pregunta...">
            <button id="send-btn" style="background:var(--rojo); color:white; border:none; padding:10px; border-radius:10px; margin-left:5px; cursor:pointer;">↑</button>
        </div>
    </div>
    
    <button id="chat-toggle">🤖</button>

    <script>
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('user-input');

        function hablar(texto) {
            window.speechSynthesis.cancel();
            const mensaje = new SpeechSynthesisUtterance(texto);
            mensaje.lang = 'es-MX';
            window.speechSynthesis.speak(mensaje);
        }

        document.getElementById('chat-toggle').onclick = () => {
            const win = document.getElementById('chat-window');
            win.style.display = win.style.display === 'none' ? 'flex' : 'none';
        };

        // Función para llamar a una IA real gratuita
        async function llamarIA(pregunta) {
            try {
                // Usamos un modelo de lenguaje de Google (Gemma) alojado en Hugging Face gratuito
                const response = await fetch("https://api-inference.huggingface.co/models/google/gemma-1.1-7b-it", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        inputs: `Eres Cero-Bot, experto en ingeniería mecatrónica del canal @circuitocero. Responde en español brevemente: ${pregunta}`,
                        parameters: { max_new_tokens: 100 }
                    })
                });
                const data = await response.json();
                
                // Limpiar la respuesta (algunas APIs devuelven el prompt original)
                let texto = data[0]?.generated_text || "Estoy procesando mucha información, ¿podrías repetir?";
                return texto.replace(/.*Responde en español brevemente:/s, '').trim();
            } catch (e) {
                return "Error de conexión. Revisa tu internet.";
            }
        }

        document.getElementById('send-btn').onclick = async () => {
            const text = userInput.value;
            if (!text) return;

            messagesDiv.innerHTML += `<div><b>Tú:</b> ${text}</div>`;
            userInput.value = "";
            const loadingId = "load-" + Date.now();
            messagesDiv.innerHTML += `<div id="${loadingId}"><i>Cero-Bot está pensando...</i></div>`;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            // LLAMADA A LA IA REAL
            const respuesta = await llamarIA(text);
            
            document.getElementById(loadingId).remove();
            messagesDiv.innerHTML += `<div style="color:red; margin:5px 0;"><b>Cero-Bot:</b> ${respuesta}</div>`;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            hablar(respuesta);
        };
    </script>
</body>
</html>
