<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circuito Cero | IA Hub</title>
    <style>
        :root { --rojo: #ff0000; --negro: #121212; --blanco: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--blanco); }
        
        /* Estilo del Chat */
        #chat-window { position: fixed; bottom: 85px; right: 20px; width: 340px; height: 480px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: none; flex-direction: column; z-index: 2000; border: 1px solid #eee; overflow: hidden; }
        .chat-header { background: var(--rojo); color: white; padding: 15px; font-weight: bold; text-align: center; }
        #messages { flex: 1; padding: 15px; overflow-y: auto; font-size: 14px; background: #fefefe; }
        .chat-input { padding: 10px; border-top: 1px solid #eee; display: flex; }
        .chat-input input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 10px; outline: none; }
        
        #chat-toggle { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: var(--rojo); color: white; border: none; cursor: pointer; font-size: 1.5rem; box-shadow: 0 5px 15px rgba(255,0,0,0.3); }
        
        .msg-ia { background: #f1f1f1; padding: 10px; border-radius: 10px; margin: 5px 0; border-left: 4px solid var(--rojo); }
        .msg-user { background: #ffebeb; padding: 10px; border-radius: 10px; margin: 5px 0; text-align: right; }
    </style>
</head>
<body>

    <div id="chat-window">
        <div class="chat-header">🤖 CERO-BOT INTERACTIVO</div>
        <div id="messages">
            <p><i>Haz clic en el robot para cargar mi cerebro...</i></p>
        </div>
        <div class="chat-input">
            <input type="text" id="user-input" placeholder="Pregunta sobre ingeniería...">
            <button id="send-btn" style="background:var(--rojo); color:white; border:none; padding:10px; border-radius:10px; margin-left:5px; cursor:pointer;">↑</button>
        </div>
    </div>
    
    <button id="chat-toggle">🤖</button>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        // --- AQUÍ PERSONALIZAS LO QUE QUIERES QUE DIGA ---
        const INSTRUCCIONES_PERSONALIZADAS = `
            Eres Cero-Bot, la IA oficial de Circuito Cero. 
            Tu creador es un experto en Mecatrónica de México. 
            Misión: Ayudar a estudiantes con Cálculo, Metrología y Electrónica.
            Personalidad: Eres técnico pero muy amable. 
            Dato importante: Promueve siempre el canal de YouTube @circuitocero y la tienda de componentes.
            Si no sabes algo, di que lo revisen en los videos del canal.
        `;

        let engine;
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('user-input');

        // Función de Voz
        function hablar(texto) {
            window.speechSynthesis.cancel();
            const mensaje = new SpeechSynthesisUtterance(texto);
            mensaje.lang = 'es-MX';
            window.speechSynthesis.speak(mensaje);
        }

        document.getElementById('chat-toggle').onclick = async () => {
            const win = document.getElementById('chat-window');
            win.style.display = win.style.display === 'none' ? 'flex' : 'none';

            if (!engine) {
                messagesDiv.innerHTML += "<p><i>Cargando Llama 3 en tu navegador... (Esto solo se hace una vez)</i></p>";
                try {
                    // Usamos Llama-3-8B optimizada para web
                    engine = await webllm.CreateEngine("Llama-3-8B-Instruct-v0.1-q4f16_1-MLC");
                    messagesDiv.innerHTML += "<p style='color:green'><b>[SISTEMA LISTO]</b></p>";
                    hablar("Sistema de Circuito Cero activado. ¿Qué vamos a construir hoy?");
                } catch (e) {
                    messagesDiv.innerHTML += "<p style='color:red'>Error: Tu navegador no tiene WebGPU activo.</p>";
                }
            }
        };

        document.getElementById('send-btn').onclick = async () => {
            const text = userInput.value;
            if (!text || !engine) return;

            messagesDiv.innerHTML += `<div class="msg-user"><b>Tú:</b> ${text}</div>`;
            userInput.value = "";
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            const chunks = await engine.chat.completions.create({
                messages: [
                    { role: "system", content: INSTRUCCIONES_PERSONALIZADAS },
                    { role: "user", content: text }
                ]
            });

            const respuesta = chunks.choices[0].message.content;
            messagesDiv.innerHTML += `<div class="msg-ia"><b>Cero-Bot:</b> ${respuesta}</div>`;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            hablar(respuesta);
        };
    </script>
</body>
</html>
