<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circuito Cero - Control de Ingeniería</title>
    <style>
        :root {
            --rojo: #ff0000;
            --negro: #000000;
            --blanco: #ffffff;
            --gris: #f4f4f4;
            --consola: #1a1a1a;
        }

        body { font-family: 'Courier New', Courier, monospace; margin: 0; background: var(--gris); }

        header { background: var(--negro); color: var(--blanco); padding: 1rem; text-align: center; border-bottom: 4px solid var(--rojo); }

        .container { max-width: 900px; margin: 2rem auto; padding: 1rem; background: var(--blanco); border: 2px solid var(--negro); box-shadow: 10px 10px 0px var(--rojo); }

        .terminal { background: var(--consola); color: #00ff00; padding: 1rem; border-radius: 5px; height: 150px; overflow-y: auto; margin-bottom: 1rem; font-size: 0.9rem; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .btn { padding: 15px; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        .btn-check { background: var(--negro); color: var(--blanco); }
        .btn-alert { background: var(--rojo); color: var(--blanco); }
        .btn:hover { opacity: 0.8; transform: scale(0.98); }

        .status-light { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: #555; margin-right: 5px; }
        .online { background: #00ff00; box-shadow: 0 0 10px #00ff00; }
    </style>
</head>
<body>

<header>
    <h1>CIRCUITO CERO // AGENTE N8N</h1>
</header>

<div class="container">
    <h3><span class="status-light online"></span>SISTEMA OPERATIVO</h3>
    <div class="terminal" id="log">
        > Sistema listo...<br>
        > Esperando comando del ingeniero...
    </div>

    <div class="controls">
        <button class="btn btn-check" onclick="enviarComando('CHECK_SISTEMA')">Verificar Red</button>
        <button class="btn btn-alert" onclick="enviarComando('ALERTA_MANTENIMIENTO')">Reportar Falla</button>
    </div>
</div>

<script>
    const terminal = document.getElementById('log');

    function escribirLog(mensaje) {
        const p = document.createElement('div');
        p.innerHTML = `> ${new Date().toLocaleTimeString()}: ${mensaje}`;
        terminal.appendChild(p);
        terminal.scrollTop = terminal.scrollHeight;
    }

    async function enviarComando(tipo) {
        escribirLog(`Iniciando ${tipo}...`);
        
        // REEMPLAZA ESTA URL con tu URL de Webhook de Producción de n8n en Render
        const WEBHOOK_URL = 'http://TU_IP_O_DOMINIO:5678/webhook-test/contacto-circuito-cero';

        try {
            const res = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    comando: tipo,
                    origen: "Web_Control_V1",
                    auth_key: "CC-99-ENG"
                })
            });

            if (res.ok) {
                escribirLog(`<span style="color:white">ÉXITO: n8n recibió la señal.</span>`);
            } else {
                escribirLog(`<span style="color:orange">ERROR: Servidor ocupado o URL inválida.</span>`);
            }
        } catch (err) {
            escribirLog(`<span style="color:red">FALLO CRÍTICO: No hay conexión con el servidor.</span>`);
        }
    }
</script>

</body>
</html>
