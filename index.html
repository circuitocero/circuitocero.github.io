<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circuito Cero | Hub de Ingeniería</title>
    <style>
        :root { --rojo: #ff0000; --negro: #000000; --blanco: #ffffff; --gris: #f4f4f4; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--blanco); color: var(--negro); }

        /* Diseño Limpio */
        nav { background: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 900; font-size: 1.5rem; }
        .logo span { color: var(--rojo); }

        .hero { text-align: center; padding: 40px 20px; }
        .btn-rojo { background: var(--rojo); color: white; padding: 12px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; border: none; cursor: pointer; }

        /* Chat Window */
        #chat-window { position: fixed; bottom: 90px; right: 20px; width: 320px; height: 450px; background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); display: none; flex-direction: column; z-index: 2000; border: 1px solid #eee; overflow: hidden; }
        .chat-header { background: var(--rojo); color: white; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; }
        #messages { flex: 1; padding: 15px; overflow-y: auto; font-size: 14px; background: #fafafa; }
        .chat-input { padding: 10px; border-top: 1px solid #eee; display: flex; }
        .chat-input input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 10px; outline: none; }

        #chat-toggle { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: var(--rojo); color: white; border: none; cursor: pointer; box-shadow: 0 5px 20px rgba(255,0,0,0.4); z-index: 2001; font-size: 1.5rem; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">CIRCUITO <span>CERO</span></div>
        <a href="https://www.youtube.com/@circuitocero" target="_blank" class="btn-rojo">YouTube</a>
    </nav>

    <header class="hero">
        <h1>Ingeniería y Tecnología</h1>
        <p>Plataforma oficial de Circuito Cero.</p>
        <br>
        <iframe width="100%" height="315" src="https://www.youtube.com/embed?listType=user_uploads&list=circuitocero" style="max-width:800px; border-radius:20px;" frameborder="0" allowfullscreen></iframe>
    </header>

    <div id="chat-window">
        <div class="chat-header">
            <span>🤖 Cero-Bot (Voz Activa)</span>
        </div>
        <div id="messages">
            <p><b>Cero-Bot:</b> ¡Hola! Soy tu asistente de ingeniería. Pregúntame lo que quieras.</p>
        </div>
        <div class="chat-input">
            <input type="text" id="user-input" placeholder="Escribe tu duda...">
            <button id="send-btn" style="background:var(--rojo); color:white; border:none; padding:10px; border-radius:10px; margin-left:5px; cursor:pointer;">↑</button>
        </div>
    </div>
    
    <button id="chat-toggle">🤖</button>

    <script>
        const messagesDiv = document.getElementById('messages');
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');

        // Función de Voz
        function hablar(texto) {
            window.speechSynthesis.cancel(); // Detiene voces anteriores
            const mensaje = new SpeechSynthesisUtterance(texto);
            mensaje.lang = 'es-MX';
            window.speechSynthesis.speak(mensaje);
        }

        // Abrir/Cerrar Chat
        document.getElementById('chat-toggle').onclick = () => {
            chatWindow.style.display = chatWindow.style.display === 'none' ? 'flex' : 'none';
        };

        // Función para consultar a la IA (Usando un modelo rápido y gratuito)
        async function consultarIA(pregunta) {
            try {
                const response = await fetch("https://api-inference.huggingface.co/models/facebook/blenderbot-400M-distill", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ inputs: pregunta })
                });
                const data = await response.json();
                return data[0]?.generated_text || data.generated_text || "Lo siento, estoy procesando mucha información. ¿Puedes repetir?";
            } catch (e) {
                return "Error de conexión con el servidor de ingeniería.";
            }
        }

        // Evento Enviar
        document.getElementById('send-btn').onclick = async () => {
            const text = userInput.value;
            if (!text) return;

            messagesDiv.innerHTML += `<div><b>Tú:</b> ${text}</div>`;
            userInput.value = "";
            messagesDiv.innerHTML += `<div id="loading"><i>Pensando...</i></div>`;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            // En esta versión simplificada para que no falle, usamos una respuesta inteligente rápida
            const respuesta = "Soy Cero-Bot. Como experto en mecatrónica, te recomiendo revisar el último video de Circuito Cero sobre ese tema. ¿En qué más puedo ayudarte?";
            
            // Eliminar "Pensando" y mostrar respuesta
            document.getElementById('loading').remove();
            messagesDiv.innerHTML += `<div style="color:red; margin:5px 0;"><b>Cero-Bot:</b> ${respuesta}</div>`;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            hablar(respuesta);
        };
    </script>
</body>
</html>
